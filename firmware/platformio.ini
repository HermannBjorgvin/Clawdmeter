[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
upload_speed = 921600
monitor_speed = 115200

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    ; NimBLE config — peripheral, 2 simultaneous connections so the OS can
    ; hold the HID link (Space key from BOOT button) while the daemon holds
    ; its own connection for the custom data service.
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER=1
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=1
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=0
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=0
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=2
    ; LVGL config via build flags
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    -DLV_USE_LOG=0
    -DLV_USE_BAR=1
    -DLV_USE_LABEL=1
    -DLV_USE_ARC=1
    -DLV_USE_BTN=1
    -DLV_USE_LINE=1
    -DLV_USE_OBJ=1
    -DLV_USE_IMG=1
    -DLV_USE_IMAGE=1
    -DLV_USE_ANIMIMG=0
    -DLV_TICK_CUSTOM=1
    -DLV_USE_SNAPSHOT=1

lib_deps =
    moononournation/GFX Library for Arduino@^1.5.6
    lewisxhe/SensorLib@^0.2.6
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0
    h2zero/NimBLE-Arduino@^2.1.1


; ---- Waveshare ESP32-S3-Touch-AMOLED-2.16 (480×480 AMOLED, CO5300, CST9220, AXP2101, QMI8658) ----
[env:waveshare_amoled_216]
board_build.arduino.memory_type = qio_opi
build_flags =
    ${env.build_flags}
    -DBOARD_WAVESHARE_AMOLED_216
    -DXPOWERS_CHIP_AXP2101
lib_deps =
    ${env.lib_deps}
    lewisxhe/XPowersLib@^0.2.7


; ---- Waveshare ESP32-S3-Touch-LCD-4 (480×480 LCD, ST7701, GT911) ----
[env:waveshare_lcd4]
board_build.arduino.memory_type = qio_opi
build_flags =
    ${env.build_flags}
    -DBOARD_WAVESHARE_LCD4
