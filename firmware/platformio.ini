[env:waveshare_amoled_216]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
upload_speed = 921600
monitor_speed = 115200

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    ; TinyUSB CDC RX buffer — default 256 bytes is too small for multi-session
    ; Activity payloads (~700-1000 bytes). Truncation between serial_link_tick()
    ; calls caused "JSON parse error (usage): InvalidInput" with len < actual.
    -DCFG_TUD_CDC_RX_BUFSIZE=4096
    -DCFG_TUD_CDC_TX_BUFSIZE=4096
    ; AXP2101 PMU
    -DXPOWERS_CHIP_AXP2101
    ; LVGL config via build flags
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    -DLV_USE_LOG=0
    -DLV_USE_BAR=1
    -DLV_USE_LABEL=1
    -DLV_USE_ARC=1
    -DLV_USE_BTN=1
    -DLV_USE_LINE=1
    -DLV_USE_OBJ=1
    -DLV_USE_IMG=1
    -DLV_USE_IMAGE=1
    -DLV_USE_ANIMIMG=0
    -DLV_TICK_CUSTOM=1
    -DLV_USE_SNAPSHOT=1

lib_deps =
    moononournation/GFX Library for Arduino@^1.5.6
    lewisxhe/SensorLib@^0.2.6
    lewisxhe/XPowersLib@^0.2.7
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0


; ============================================================================
; WiFi-transport variant — bord polls daemon over HTTP on the LAN instead of
; USB CDC. Requires src/wifi_config.h with WIFI_SSID / WIFI_PASSWORD /
; BRIDGE_HOST / BRIDGE_PORT / BRIDGE_TOKEN (template at wifi_config.h.example).
;
;   pio run -e waveshare_amoled_216_wifi -t upload
; ============================================================================
[env:waveshare_amoled_216_wifi]
extends = env:waveshare_amoled_216
build_flags =
    ${env:waveshare_amoled_216.build_flags}
    -DCLAWDMETER_TRANSPORT_WIFI
