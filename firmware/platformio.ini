[platformio]
default_envs = waveshare_amoled_216

; ----------------------------------------------------------------------
; Shared base — everything common to all supported boards.
; Per-board envs only set the board flag and any board-specific deps.
; ----------------------------------------------------------------------
[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
upload_speed = 921600
monitor_speed = 115200

build_flags =
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    ; (PMU chip selection is per-board; see env blocks below)
    ; NimBLE config — peripheral-only, single connection
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER=1
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=1
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=0
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=0
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    ; LVGL config via build flags
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    -DLV_USE_LOG=0
    -DLV_USE_BAR=1
    -DLV_USE_LABEL=1
    -DLV_USE_ARC=1
    -DLV_USE_BTN=1
    -DLV_USE_LINE=1
    -DLV_USE_OBJ=1
    -DLV_USE_IMG=1
    -DLV_USE_IMAGE=1
    -DLV_USE_ANIMIMG=0
    -DLV_TICK_CUSTOM=1
    -DLV_USE_SNAPSHOT=1

lib_deps =
    moononournation/GFX Library for Arduino@^1.5.6
    lewisxhe/SensorLib@^0.2.6
    lewisxhe/XPowersLib@^0.2.7
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0
    h2zero/NimBLE-Arduino@^2.1.1

; ----------------------------------------------------------------------
; Waveshare ESP32-S3-Touch-AMOLED-2.16 (480x480 square, CO5300, AXP2101,
; QMI8658 IMU). The original target board.
; ----------------------------------------------------------------------
[env:waveshare_amoled_216]
build_flags =
    ${env.build_flags}
    -DBOARD_WAVESHARE_AMOLED_216=1
    -DXPOWERS_CHIP_AXP2101

; ----------------------------------------------------------------------
; LilyGO T4-S3 (450x600 portrait, RM690B0, CST226SE touch, SY6970 PMU,
; no IMU, single boot button on GPIO 0).
; ----------------------------------------------------------------------
[env:lilygo_t4s3]
build_flags =
    ${env.build_flags}
    -DBOARD_LILYGO_T4S3=1
    -DXPOWERS_CHIP_SY6970
