; ---------------------------------------------------------------------------
; Shared NimBLE + LVGL flags used by every board variant
; ---------------------------------------------------------------------------
[common]
build_flags =
    ; NimBLE config — peripheral-only, single connection
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER=1
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=1
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=0
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=0
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=1
    ; LVGL config via build flags
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    -DLV_USE_LOG=0
    -DLV_USE_BAR=1
    -DLV_USE_LABEL=1
    -DLV_USE_ARC=1
    -DLV_USE_BTN=1
    -DLV_USE_LINE=1
    -DLV_USE_OBJ=1
    -DLV_USE_IMG=1
    -DLV_USE_IMAGE=1
    -DLV_USE_ANIMIMG=0
    -DLV_TICK_CUSTOM=1

; ---------------------------------------------------------------------------
; Original target: Waveshare ESP32-S3-Touch-AMOLED-2.16
; ---------------------------------------------------------------------------
[env:waveshare_amoled_216]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
upload_speed = 921600
monitor_speed = 115200

; Compile everything in src/ EXCEPT the CYD-specific subdir
build_src_filter = +<*> -<cyd/>

build_flags =
    ${common.build_flags}
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM
    -DBLE_ENABLE_HID=1
    ; AXP2101 PMU
    -DXPOWERS_CHIP_AXP2101
    -DLV_USE_SNAPSHOT=1

lib_deps =
    moononournation/GFX Library for Arduino@^1.5.6
    lewisxhe/SensorLib@^0.2.6
    lewisxhe/XPowersLib@^0.2.7
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0
    h2zero/NimBLE-Arduino@^2.1.1

; ---------------------------------------------------------------------------
; CYD port: ESP32-2432S028R (ESP32-WROOM-32, ILI9341 320x240, XPT2046 touch)
; - No PSRAM, no IMU, no PMU, no battery, no physical button row
; - Display-only; touch zones cycle Usage <-> Bluetooth screens
; ---------------------------------------------------------------------------
[env:cyd]
; pioarduino ships Arduino Core 3.x which Arduino_GFX needs (esp32-hal-periman.h)
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32dev
framework = arduino
upload_speed = 115200
monitor_speed = 115200
; This CYD's auto-reset circuit doesn't toggle download mode reliably via
; DTR/RTS. We stage the chip manually (hold BOOT while plugging in USB) and
; tell esptool to skip its own reset attempt and just sync.
upload_flags = --before=no_reset
; CYD app is large (LVGL + NimBLE + Arduino_GFX); needs the bigger 3 MB app slot
board_build.partitions = huge_app.csv
board_build.flash_mode = qio

; Pull in CYD-specific sources; exclude AMOLED-only files and oversize fonts
; CYD has its own main/ui/splash under src/cyd/. usage_rate.cpp compiles as-is.
build_src_filter =
    +<*>
    -<main.cpp>
    -<ui.cpp>
    -<power.cpp>
    -<imu.cpp>
    -<splash.cpp>
    -<font_tiempos_56.c>
    -<font_tiempos_34.c>
    -<font_styrene_48.c>
    -<font_mono_32.c>

build_flags =
    ${common.build_flags}
    -DCYD_BUILD=1
    -DBLE_ENABLE_HID=0

lib_deps =
    moononournation/GFX Library for Arduino@^1.5.6
    ; Bitbang driver — avoids fighting the TFT for a hardware SPI bus.
    ; The XPT2046 only runs at ~1 MHz anyway, bitbang is plenty fast.
    nitek/XPT2046_Bitbang_Slim@^2.0.0
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0
    h2zero/NimBLE-Arduino@^2.1.1
